# =============================================================================
# CI/CD Pipeline: lint → test → build → deploy
#
# Triggers:
#   - push to main         → full pipeline (lint + test + build + deploy)
#   - pull_request to main → lint + test + terraform plan (no build, no deploy)
#
# Auth: GitHub Actions assumes an AWS IAM role via OIDC.
# Zero long-lived credentials stored in GitHub secrets.
# The role is created by terraform/cicd.tf.
# After terraform apply, copy the output github_actions_role_arn to
# the GitHub repo secret named AWS_ROLE_ARN.
#
# Required GitHub secrets:
#   AWS_ROLE_ARN — ARN of the IAM role created by Terraform (cicd.tf output)
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:    us-east-1
  PROJECT_NAME:  erp-pipeline
  ENVIRONMENT:   dev
  NODE_VERSION:  "20"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint
  # Matrix: runs ESLint on all three services in parallel.
  # npm cache keyed on each service's package-lock.json — a lock-file change
  # in one service only invalidates that service's cache, not the others.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [productos, ordenes, stock]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Lint svc-${{ matrix.service }}
        run: npm ci --silent && npm run lint
        working-directory: services/${{ matrix.service }}

  # ---------------------------------------------------------------------------
  # Job 2: Test
  # Matrix: runs Jest against a real postgres:15 service container.
  # Each matrix variant gets its own isolated runner + DB — no shared state,
  # no race conditions on migrations.
  # Cache covers both migrations and the service's own dependencies.
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.service }})
    needs: lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [productos, ordenes, stock]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       erpdb
          POSTGRES_USER:     erpadmin
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://erpadmin:test_password@localhost:5432/erpdb
      NODE_ENV:     test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          # Both migrations and the service share this cache entry so a
          # single npm ci in migrations doesn't bust the service cache.
          cache-dependency-path: |
            migrations/package-lock.json
            services/${{ matrix.service }}/package-lock.json

      - name: Run database migrations
        run: npm ci --silent && node run.js
        working-directory: migrations

      - name: Test svc-${{ matrix.service }}
        run: npm ci --silent && npm test
        working-directory: services/${{ matrix.service }}

  # ---------------------------------------------------------------------------
  # Job 3: Terraform (PRs only)
  # Runs fmt check + plan against the real AWS account so reviewers can see
  # exactly what infrastructure would change before merging.
  # Needs the OIDC trust policy to allow pull_request events (see cicd.tf).
  # ---------------------------------------------------------------------------
  terraform:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # Required for OIDC token request
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform init
        run: terraform init -input=false
        working-directory: terraform

      - name: Terraform plan
        run: terraform plan -no-color -input=false
        working-directory: terraform
        env:
          TF_VAR_github_repo:  ${{ github.repository }}
          TF_VAR_environment:  ${{ env.ENVIRONMENT }}
          TF_VAR_project_name: ${{ env.PROJECT_NAME }}
          TF_VAR_aws_region:   ${{ env.AWS_REGION }}

  # ---------------------------------------------------------------------------
  # Job 4: Build
  # Build Docker images and push to ECR. Only runs on push to main (not PRs).
  # Uses OIDC — no AWS access keys stored anywhere.
  # Outputs the image tag so the deploy job knows which revision to roll out.
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push to ECR
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # Required for OIDC token request
      contents: read

    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: tag
        run: echo "value=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push all images
        run: |
          chmod +x scripts/build.sh
          GIT_SHA=$(git rev-parse --short HEAD) bash scripts/build.sh
        env:
          AWS_REGION:    ${{ env.AWS_REGION }}
          PROJECT_NAME:  ${{ env.PROJECT_NAME }}

  # ---------------------------------------------------------------------------
  # Job 5: Deploy
  # Register a new ECS task definition revision (with the just-pushed image tag)
  # and update the service. Waits for the deployment to stabilize.
  # If health checks fail after deployment, ECS auto-rolls back (circuit breaker).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ECS
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS
        run: |
          chmod +x scripts/deploy.sh
          bash scripts/deploy.sh
        env:
          IMAGE_TAG:     ${{ needs.build.outputs.image_tag }}
          AWS_REGION:    ${{ env.AWS_REGION }}
          PROJECT_NAME:  ${{ env.PROJECT_NAME }}
          ENVIRONMENT:   ${{ env.ENVIRONMENT }}
