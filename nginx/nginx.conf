# nginx.conf — reverse proxy sidecar
# Routes requests to the 3 Node.js services running on localhost in the same ECS task.
# All containers share the same network namespace in ECS awsvpc mode.
# See ADR-001: nginx replaces ALB to stay within free tier ($0 vs $16/month).

worker_processes 1;

events {
    worker_connections 256;
}

http {
    # Don't expose nginx version in error pages or headers.
    server_tokens off;

    # Rate limiting: 30 requests/second per client IP.
    # 10m zone holds ~160 000 IP states (10 MB / 64 bytes per state).
    # burst=60 allows short spikes; nodelay serves them immediately
    # instead of queuing. Requests beyond burst return 429.
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_status 429;

    # Log to stdout/stderr so ECS captures them in CloudWatch Logs.
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Upstream definitions — services on localhost (shared network namespace).
    upstream productos { server 127.0.0.1:3001; }
    upstream ordenes   { server 127.0.0.1:3002; }
    upstream stock     { server 127.0.0.1:3003; }

    server {
        listen 80;
        server_name _;

        # nginx health check endpoint (checked by ECS task definition healthCheck).
        # Exempt from rate limiting — ECS calls this every 30s from the same host.
        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # Exact-match health checks for each upstream service.
        # Must be declared before the regex API blocks — nginx evaluates exact
        # matches (=) before regex (~), so these take priority correctly.
        location = /api/productos/health { proxy_pass http://productos/health; }
        location = /api/ordenes/health   { proxy_pass http://ordenes/health; }
        location = /api/stock/health     { proxy_pass http://stock/health; }

        # ---------------------------------------------------------------------
        # API routes — regex locations (/.*)?$ ensures the path must end at the
        # service name boundary or continue with a slash. This prevents
        # /api/productosmalicious from matching the productos block.
        #
        # $1 captures the remainder (e.g. "" or "/") so Express sees /productos,
        # /ordenes, /stock as the root of each service router.
        # ---------------------------------------------------------------------

        location ~ ^/api/productos(/.*)?$ {
            limit_req zone=api burst=60 nodelay;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout    30s;
            proxy_connect_timeout  5s;
            proxy_pass http://productos/productos$1;
        }

        location ~ ^/api/ordenes(/.*)?$ {
            limit_req zone=api burst=60 nodelay;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout    30s;
            proxy_connect_timeout  5s;
            proxy_pass http://ordenes/ordenes$1;
        }

        location ~ ^/api/stock(/.*)?$ {
            limit_req zone=api burst=60 nodelay;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout    30s;
            proxy_connect_timeout  5s;
            proxy_pass http://stock/stock$1;
        }

        # Default: 404 for unknown routes.
        location / {
            return 404 '{"error":"route not found"}';
            add_header Content-Type application/json;
        }
    }
}
