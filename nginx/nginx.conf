# nginx.conf — reverse proxy sidecar
# Routes requests to the 3 Node.js services running on localhost in the same ECS task.
# All containers share the same network namespace in ECS awsvpc mode.
# See ADR-001: nginx replaces ALB to stay within free tier ($0 vs $16/month).

events {
    worker_processes  1;
    worker_connections 256;
}

http {
    # Don't expose nginx version in error pages
    server_tokens off;

    # Log to stdout/stderr so ECS captures them in CloudWatch Logs.
    # Files under /var/log/nginx/ are never forwarded by the awslogs driver.
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Upstream definitions — services on localhost (shared network namespace)
    upstream productos {
        server 127.0.0.1:3001;
    }
    upstream ordenes {
        server 127.0.0.1:3002;
    }
    upstream stock {
        server 127.0.0.1:3003;
    }

    server {
        listen 80;
        server_name _;

        # nginx health check endpoint (checked by ECS)
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # Route /api/productos/* → svc-productos:3001
        location /api/productos {
            proxy_pass http://productos/productos;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # Route /api/ordenes/* → svc-ordenes:3002
        location /api/ordenes {
            proxy_pass http://ordenes/ordenes;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # Route /api/stock/* → svc-stock:3003
        location /api/stock {
            proxy_pass http://stock/stock;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # Health checks for each upstream service (proxied through nginx)
        location /api/productos/health {
            proxy_pass http://productos/health;
        }
        location /api/ordenes/health {
            proxy_pass http://ordenes/health;
        }
        location /api/stock/health {
            proxy_pass http://stock/health;
        }

        # Default: 404 for unknown routes
        location / {
            return 404 '{"error":"route not found"}';
            add_header Content-Type application/json;
        }
    }
}
